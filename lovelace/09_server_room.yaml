  - type: vertical-stack
    title: "Климат"
    cards:
      - type: custom:mini-graph-card
        entities:
          - entity: sensor.serverroom_aqara_air_sensor_temperature
            name: "Температура"
        lower_bound: 18
        upper_bound: 50
        color_thresholds:
          - value: 25
            color: "#00FFFF"
          - value: 28
            color: "#00FF00"
          - value: 32
            color: "#FFFF00"
          - value: 36
            color: "#FFD700"
          - value: 40
            color: "#FF0000"
          - value: 50
            color: "#800000"
        animate: true
        line_width: 2
        hour24: true
        points_per_hour: 1
        group_by: hour
