title: "Серверная"
icon: mdi:server-network

cards:
  - type: vertical-stack
    title: "UPS"
    cards:
      - type: horizontal-stack
        cards:
          - type: custom:mushroom-template-card
            entity: sensor.ups_status
            primary: "Статус"
            secondary: >-
              {% if is_state(entity, 'Online') %}
                От сети
              {% elif is_state(entity, 'Online Battery Charging') %}
                Зарядка батареи
              {% elif is_state(entity, 'On Battery Battery Discharging') %}
                От батареи
              {% else %}
                {{ states(entity) }}
              {% endif %}
            icon: mdi:battery
            icon_color: >-
              {% if is_state(entity, 'Online') %}
                green
              {% elif is_state(entity, 'Online Battery Charging') %}
                amber
              {% elif is_state(entity, 'On Battery Battery Discharging') %}
                red
              {% else %}
                grey
              {% endif %}
            layout: horizontal

          - type: custom:mushroom-template-card
            entity: switch.ups_data_plug
            primary: "Соединение"
            secondary: >-
              {% if is_state(entity, 'on') %}
                Подключено
              {% elif is_state(entity, 'off') %}
                Отключено
              {% else %}
                {{ states(entity) }}
              {% endif %}
            icon: mdi:connection
            icon_color: >-
              {% if is_state(entity, 'on') %}
                green
              {% elif is_state(entity, 'off') %}
                red
              {% else %}
                grey
              {% endif %}
            layout: horizontal

      - type: horizontal-stack
        cards:
          - type: gauge
            name: "Заряд аккумулятора"
            unit: "%"
            entity: sensor.ups_zariad_akkumuliatora
            severity:
              green: 80
              yellow: 40
              red: 0

          - type: gauge
            name: "Загрузка"
            unit: "%"
            entity: sensor.ups_zagruzka
            severity:
              green: 0
              yellow: 50
              red: 80

  - type: vertical-stack
    title: "Keenetic Router"
    cards:
      - type: custom:mushroom-template-card
        entity: binary_sensor.router_xray_status
        primary: "Xray"
        secondary: >-
          {% if is_state(entity, 'on') %}
            Работает
          {% elif is_state(entity, 'off') %}
            Недоступен
          {% else %}
            {{ states(entity) }}
          {% endif %}
        icon: mdi:shield-check
        icon_color: >-
          {% if is_state(entity, 'on') %}
            green
          {% elif is_state(entity, 'off') %}
            red
          {% else %}
            grey
          {% endif %}
        layout: horizontal

      - type: horizontal-stack
        cards:
          - type: custom:mini-graph-card
            entities:
              - entity: sensor.keenetic_gateway_kib_s_received
                name: "Download rate"
                show_legend: false
            color_thresholds:
              - value: 1000
                color: "#00FFFF"
              - value: 5000
                color: "#00FF00"
              - value: 10000
                color: "#FFFF00"
              - value: 20000
                color: "#FFD700"
              - value: 30000
                color: "#FF0000"
              - value: 40000
                color: "#800000"
            animate: true
            line_width: 2
            hour24: true
            points_per_hour: 3
            group_by: interval
            lower_bound: 0
            upper_bound: 50000

          - type: custom:mini-graph-card
            entities:
              - entity: sensor.keenetic_gateway_kib_s_sent
                name: "Upload rate"
                show_legend: false
            color_thresholds:
              - value: 1000
                color: "#00FFFF"
              - value: 5000
                color: "#00FF00"
              - value: 10000
                color: "#FFFF00"
              - value: 20000
                color: "#FFD700"
              - value: 30000
                color: "#FF0000"
              - value: 40000
                color: "#800000"
            animate: true
            line_width: 2
            hour24: true
            points_per_hour: 3
            group_by: interval
            lower_bound: 0
            upper_bound: 50000

  - type: vertical-stack
    title: "MiniPC"
    cards:
      - type: tile
        entity: sensor.last_boot
        name: "Последняя загрузка"
        format: relative

      - type: horizontal-stack
        cards:
          - type: gauge
            name: "Загрузка CPU"
            unit: "%"
            entity: sensor.processor_use_percent
            severity:
              green: 0
              yellow: 60
              red: 85

          - type: gauge
            name: "Загрузка ОЗУ"
            unit: "%"
            entity: sensor.memory_use_percent
            severity:
              green: 0
              yellow: 60
              red: 85

      # - type: custom:mini-graph-card
      #   entities:
      #     - entity: sensor.cpu_temperature
      #       name: 'Температура CPU'
      #       show_legend: false
      #   color_thresholds:
      #     - value: 35
      #       color: '#00FFFF'
      #     - value: 40
      #       color: '#00FF00'
      #     - value: 43
