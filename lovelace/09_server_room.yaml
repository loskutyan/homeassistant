      #   lower_bound: 25
      #   upper_bound: 55

      - type: horizontal-stack
        cards:
          - type: gauge
            name: "Диск заполнен"
            unit: "%"
            entity: sensor.disk_use_percent
            severity:
              green: 0
              yellow: 60
              red: 85

          - type: gauge
            name: "Свободное место"
            unit: "Гб"
            entity: sensor.disk_free
            min: 0
            max: 458
            severity:
              red: 1
              yellow: 20
              green: 100

  - type: vertical-stack
    title: "Cubeserver"
    cards:
      - type: horizontal-stack
        cards:
          - type: custom:mushroom-template-card
            entity: switch.cubeserver_vm_windows10
            primary: "Windows 10 VM"
            secondary: >-
              {% if is_state(entity, 'on') %}
                Запущена
              {% elif is_state(entity, 'off') %}
                Остановлена
              {% else %}
                {{ states(entity) }}
              {% endif %}
            icon: mdi:microsoft-windows
            icon_color: >-
              {% if is_state(entity, 'on') %}
                blue
              {% elif is_state(entity, 'off') %}
                grey
              {% else %}
                red
              {% endif %}
            layout: horizontal

          - type: custom:mushroom-template-card
            entity: switch.cubeserver_vm_ubuntuyadisk
            primary: "Ubuntu YaDisk VM"
            secondary: >-
              {% if is_state(entity, 'on') %}
                Запущена
              {% elif is_state(entity, 'off') %}
                Остановлена
              {% else %}
                {{ states(entity) }}
              {% endif %}
            icon: mdi:ubuntu
            icon_color: >-
              {% if is_state(entity, 'on') %}
                orange
              {% elif is_state(entity, 'off') %}
                grey
              {% else %}
                red
              {% endif %}
            layout: horizontal

      - type: entities
        entities:
          - type: custom:multiple-entity-row
            entity: sensor.cubeserver_parity_status
            name: "Parity-Check"
            entities:
              - entity: sensor.cubeserver_parity_finish_timestamp
                name: "Завершение"
                format: relative
                hide_unavailable: true
              - entity: sensor.cubeserver_parity_speed
                name: "Скорость"
                hide_if: 0
              - entity: sensor.cubeserver_parity_progress
                name: "Завершено"
                format: precision2
                hide_if: 100

      - type: custom:mini-graph-card
        entities:
          - entity: sensor.cubeserver_plug_power
            name: "Cubeserver Power"
            show_legend: false
        color_thresholds:
          - value: 80
            color: "#00FFFF"
          - value: 120
            color: "#00FF00"
          - value: 180
            color: "#FFFF00"
          - value: 250
            color: "#FFD700"
          - value: 300
            color: "#FF0000"
          - value: 400
            color: "#800000"
        animate: true
        line_width: 2
        hour24: true
        points_per_hour: 3
        group_by: interval
        lower_bound: 50
        upper_bound: 600

