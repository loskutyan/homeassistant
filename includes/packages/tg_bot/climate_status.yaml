tg_climate_status:
  script:
    telegram_climate_report:
      alias: "Отправка отчета о состоянии воздуха"
      sequence:
        - service: notify.tg_bot
          data:
            message: |
              {%- macro humidifier_status(room) -%}
                {%- set hum = states('humidifier.' ~ room ~ '_smartmi_humidifier') -%}
                {%- if hum == 'off' -%}
                  выключен
                {%- elif hum == 'on' -%}
                  {%- set tank = states('sensor.' ~ room ~ '_smartmi_humidifier_water_tank') -%}
                  {%- if tank == 'off' -%}
                    контейнер снят
                  {%- else -%}
                    {{ states('sensor.' ~ room ~ '_smartmi_humidifier_motor_speed') }} об/мин, ур. воды {{ states('sensor.' ~ room ~ '_smartmi_humidifier_water_level') }}%
                  {%- endif -%}
                {%- else -%}
                  недоступен
                {%- endif -%}
              {%- endmacro -%}
              {%- macro breezer_status(room) -%}
                {%- set breezer = states('fan.mijia_airpurifier_' ~ room) -%}
                {%- if breezer == 'off' -%}
                  выключен
                {%- elif breezer == 'unavailable' -%}
                  недоступен
                {%- elif breezer == 'on' -%}
                  {%- set mode = states('sensor.' ~ room ~ '_airpurifier_preset_mode') -%}
                  {%- if mode == 'Sleep' -%}
                    {%- set mode_msg = 'ночной' -%}
                  {%- elif mode == 'Auto' -%}
                    {%- set mode_msg = 'автоматический' -%}
                  {%- elif mode == 'Favorite' -%}
                    {%- if is_state('switch.' ~ room ~ '_airpurifier_favourite_speed_smart_control', 'on') -%}
                      {%- set mode_msg = 'умный' -%}
                    {%- elif is_state('switch.' ~ room ~ '_airpurifier_forced_ventilation', 'on') -%}
                      {%- set mode_msg = 'проветривания' -%}
                    {%- else -%}
                      {%- set mode_msg = 'фиксированный' -%}
                    {%- endif -%}
                  {%- endif -%}
                  {%- set heater_msg = '' -%}
                  {%- if is_state('binary_sensor.' ~ room ~ '_airpurifier_ptc_status', 'on') -%}
                    {%- set heater_msg = ', \U0001F525 подогрев включен' -%}
                  {%- endif -%}
                  режим {{ mode_msg }}, скорость {{ states('sensor.' ~ room ~ '_airpurifier_current_speed') }}{{ heater_msg }}
                {%- endif -%}
              {%- endmacro -%}
              {{'\U0001F6CC'}} Спальня:
              {{'\U0001F321'}} {{ states('sensor.bedroom_average_temperature') | round(1) }}°C  {{'\U0001F4A7'}} {{ states('sensor.bedroom_average_humidity') | round(1) }}%
              {{'\U0001F332'}} {{ states('sensor.bedroom_co2') | int }}ppm {{'\U0000269B'}} {{ states('sensor.bedroom_pm25') }}ppm
              {{'\U0001F6BF'}} Увлажнитель: {{ humidifier_status('bedroom') }}
              {{'\U0001F4A8'}} Бризер: {{ breezer_status('bedroom') }}

              {{'\U0001F9D2'}} Детская:
              {{'\U0001F321'}} {{ states('sensor.kidsroom_average_temperature') | round(1) }}°C  {{'\U0001F4A7'}} {{ states('sensor.kidsroom_average_humidity') | round(1) }}%
              {{'\U0001F332'}} {{ states('sensor.kidsroom_co2') | int }}ppm {{'\U0000269B'}} {{ states('sensor.kidsroom_pm25') }}ppm
              {{'\U0001F6BF'}} Увлажнитель: {{ humidifier_status('kidsroom') }}
              {{'\U0001F4A8'}} Бризер: {{ breezer_status('kidsroom') }}

  automation:
    - id: "Отчет о состоянии воздуха в боте"
      alias: telegram_climate_report
      initial_state: true
      trigger:
        - platform: event
          event_type: telegram_text
          event_data:
            text: "Отчет по климату"
      action:
        - service: script.telegram_climate_report
