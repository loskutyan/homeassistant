kidsroom_air:
  input_boolean:
    kidsroom_airpurifier_favourite_speed_smart_control:
      name: "Умное управление скоростью бризера в детской"

  input_number:
    kidsroom_airpurifier_favorite_speed:
      name: "Установленная скорость бризера в детской"
      min: 60
      max: 150
      step: 1
      icon: mdi:weather-windy

  input_select:
    kidsroom_airpurifier_mode:
      name: "Режим работы бризера в детской"
      options:
        - Auto
        - Sleep
        - Favorite

  timer:
    kidsroom_airpurifier_fixed_speed:
      name: "Фиксированная скорость бризера в детской, осталось "
      duration: 1800

  template:
    - sensor:
        - name: "Cleargrass air CO²"
          unique_id: kidsroom_co2
          default_entity_id: sensor.kidsroom_co2
          device_class: carbon_dioxide
          unit_of_measurement: "ppm"
          availability: >
            {% set value = states('sensor.cgllc_s1_04e8_co2_density') | float(0) %}
            {{ value > 0 and value < 10000 }}
          state: "{{ states('sensor.cgllc_s1_04e8_co2_density') }}"
          icon: mdi:molecule-co2

        - name: "Cleargrass air tVOC"
          unique_id: kidsroom_tvoc
          default_entity_id: sensor.kidsroom_tvoc
          device_class: volatile_organic_compounds
          unit_of_measurement: "ppb"
          availability: >
            {% set value = states('sensor.cgllc_s1_04e8_tvoc_density') | float(0) %}
            {{ value > 0 and value < 10000 }}
          state: "{{ states('sensor.cgllc_s1_04e8_tvoc_density') }}"
          icon: mdi:atom

        - name: "Cleargrass air PM2.5"
          unique_id: kidsroom_pm25
          default_entity_id: sensor.kidsroom_pm25
          device_class: pm25
          unit_of_measurement: "µg/m³"
          availability: >
            {% set value = states('sensor.cgllc_s1_04e8_pm25_density') | float(-1) %}
            {{ value >= 0 and value < 1000 }}
          state: "{{ states('sensor.cgllc_s1_04e8_pm25_density') }}"
          icon: mdi:molecule

        - name: "Cleargrass air Температура"
          unique_id: cleargrass_air_temperature
          default_entity_id: sensor.cleargrass_air_temperature
          device_class: temperature
          unit_of_measurement: "°C"
          availability: >
            {% set value = states('sensor.cgllc_s1_04e8_temperature') | float(0) %}
            {{ value > 0 and value < 100 }}
          state: "{{ states('sensor.cgllc_s1_04e8_temperature') }}"

        - name: "Cleargrass air Влажность"
          unique_id: cleargrass_air_humidity
          default_entity_id: sensor.cleargrass_air_humidity
          device_class: humidity
          unit_of_measurement: "%"
          availability: >
            {% set value = states('sensor.cgllc_s1_04e8_relative_humidity') | float(0) %}
            {{ value > 0 and value < 100 }}
          state: "{{ states('sensor.cgllc_s1_04e8_relative_humidity') }}"

        - name: "Kidsroom Aqara Температура"
          unique_id: kidsroom_aqara_temperature
          default_entity_id: sensor.kidsroom_aqara_temperature
          device_class: temperature
          unit_of_measurement: "°C"
          availability: "{{ states('sensor.kidsroom_aqara_air_sensor_temperature') | float(0) > 10 }}"
          state: "{{ states('sensor.kidsroom_aqara_air_sensor_temperature') }}"

        - name: "Kidsroom Aqara Влажность"
          unique_id: kidsroom_aqara_humidity
          default_entity_id: sensor.kidsroom_aqara_humidity
          device_class: humidity
          unit_of_measurement: "%"
          availability: "{{ states('sensor.kidsroom_aqara_air_sensor_humidity') | float(0) > 5 }}"
          state: "{{ states('sensor.kidsroom_aqara_air_sensor_humidity') }}"

        - name: "Температура"
          unique_id: kidsroom_average_temperature
          default_entity_id: sensor.kidsroom_average_temperature
          device_class: temperature
          unit_of_measurement: "°C"
          availability: >
            {% set temps = [
              states('sensor.cleargrass_air_temperature'),
              states('sensor.kidsroom_aqara_temperature')
            ] %}
            {{ temps | reject('equalto', 'unavailable') | list | count == 2 }}
          state: >
            {% set temps = [
              states('sensor.cleargrass_air_temperature'),
              states('sensor.kidsroom_aqara_temperature')
            ] %}
            {% set filtered_temps = temps | reject('equalto', 'unavailable') | map('float') | list %}
            {{ (filtered_temps | sum / filtered_temps | count) | round(2) }}

        - name: "Влажность"
          unique_id: kidsroom_average_humidity
          default_entity_id: sensor.kidsroom_average_humidity
          device_class: humidity
          unit_of_measurement: "%"
          availability: >
            {% set hums = [
              states('sensor.cleargrass_air_humidity'),
              states('sensor.kidsroom_aqara_humidity')
            ] %}
            {{ hums | reject('equalto', 'unavailable') | list | count == 2 }}
          state: >
            {% set hums = [
              states('sensor.cleargrass_air_humidity'),
              states('sensor.kidsroom_aqara_humidity')
            ] %}
            {% set filtered_hums = hums | reject('equalto', 'unavailable') | map('float') | list %}
            {{ (filtered_hums | sum / filtered_hums | count) | round(2) }}

        - name: "Mi Fresh Air Kidsroom CO²"
          unique_id: kidsroom_airpurifier_co2
          default_entity_id: sensor.kidsroom_airpurifier_co2
          device_class: carbon_dioxide
          unit_of_measurement: "ppm"
          state: "{{ state_attr('fan.mijia_airpurifier_kidsroom', 'co2') }}"
          icon: mdi:molecule-co2

        - name: "Mi Fresh Air Kidsroom PM2.5"
          unique_id: kidsroom_airpurifier_pm25
          default_entity_id: sensor.kidsroom_airpurifier_pm25
          device_class: pm25
          unit_of_measurement: "µg/m³"
          state: "{{ state_attr('fan.mijia_airpurifier_kidsroom', 'pm25') }}"
          icon: mdi:grain

        - name: "Mi Fresh Air Kidsroom Температура"
          unique_id: kidsroom_airpurifier_temperature
          default_entity_id: sensor.kidsroom_airpurifier_temperature
          device_class: temperature
          unit_of_measurement: "°C"
          state: "{{ state_attr('fan.mijia_airpurifier_kidsroom', 'temperature') }}"
          icon: mdi:thermometer

        - name: "Mi Fresh Air Kidsroom Текущая скорость"
          unique_id: kidsroom_airpurifier_current_speed
          default_entity_id: sensor.kidsroom_airpurifier_current_speed
          device_class: volume_flow_rate
          unit_of_measurement: "m³/h"
          state: "{{ state_attr('fan.mijia_airpurifier_kidsroom', 'control_speed') }}"
          icon: mdi:speedometer

        - name: "Mi Fresh Air Kidsroom Установленная скорость"
          unique_id: kidsroom_airpurifier_favorite_speed
          default_entity_id: sensor.kidsroom_airpurifier_favorite_speed
          device_class: volume_flow_rate
          unit_of_measurement: "m³/h"
          state: "{{ state_attr('fan.mijia_airpurifier_kidsroom', 'favorite_speed') }}"
          icon: mdi:speedometer

        - name: "Mi Fresh Air Kidsroom Состояние фильтра"
          unique_id: kidsroom_airpurifier_dust_filter_life_remaining
          default_entity_id: sensor.kidsroom_airpurifier_dust_filter_life_remaining
          unit_of_measurement: "%"
          state: "{{ state_attr('fan.mijia_airpurifier_kidsroom', 'dust_filter_life_remaining') }}"
          icon: mdi:air-filter

        - name: "Mi Fresh Air Kidsroom Дней до замены фильтра"
          unique_id: kidsroom_airpurifier_dust_filter_life_remaining_days
          default_entity_id: sensor.kidsroom_airpurifier_dust_filter_life_remaining_days
          state: "{{ state_attr('fan.mijia_airpurifier_kidsroom', 'dust_filter_life_remaining_days') }}"
          icon: mdi:air-filter

        - name: "Mi Fresh Air Kidsroom Режим работы"
          unique_id: kidsroom_airpurifier_preset_mode
          default_entity_id: sensor.kidsroom_airpurifier_preset_mode
          state: "{{ state_attr('fan.mijia_airpurifier_kidsroom', 'preset_mode') }}"

        - name: "Разница текущей и желаемой температур в детской"
          unique_id: kidsroom_current_target_temperature_delta
          default_entity_id: sensor.kidsroom_current_target_temperature_delta
          device_class: temperature
          unit_of_measurement: "°C"
          availability: >
            {{ states('sensor.kidsroom_average_temperature') | float(0) > 0 }}
          state: >
            {{ states('sensor.kidsroom_average_temperature') | float(22) - states('input_number.target_temperature') | float(22) }}

        - name: "Поправка к скорости бризера в детской"
          unique_id: kidsroom_airpurifier_target_co2_delta
          default_entity_id: sensor.kidsroom_airpurifier_target_co2_delta
          state: >
            {% set temp_delta_ct = states('sensor.kidsroom_current_target_temperature_delta') | float(1) %}
            {% set temp_delta_ot = states('sensor.outside_target_temperature_delta') | float(1) %}
            {% set x = temp_delta_ot | abs %}
            {% set k = 0.05 %}
            {% set exp_2kx = e**(-2*k*x) %}
            {% set tahn_temp_delta_ot = (1 - exp_2kx) / (1 + exp_2kx) %}
            {% set temp_delta_product = temp_delta_ct * temp_delta_ot %}
            {% set temp_delta_sign = 0 if temp_delta_product == 0 else temp_delta_product / (temp_delta_product | abs) %}
            {{ min(150, (temp_delta_sign * (temp_delta_ct | abs)**1.5 + 10 * tahn_temp_delta_ot) | round * 10) }}

        - name: "kidsroom_airpurifier_speed_min_co2"
          unique_id: kidsroom_airpurifier_speed_min_co2
          default_entity_id: sensor.kidsroom_airpurifier_speed_min_co2
          availability: >
            {% set valid_speed = states('sensor.kidsroom_airpurifier_favorite_speed') | float(0) >= 60 %}
            {% set valid_temp = states('sensor.kidsroom_average_temperature') | float(0) > 0 %}
            {{ valid_speed and valid_temp }}
          state: >
            {% set co2_delta = states('sensor.kidsroom_airpurifier_target_co2_delta') | float(0) %}
            {% set cooling_on = is_state('binary_sensor.kidsroom_ac_is_cooling', 'on') | int %}
            {% set heating_on = is_state('switch.kidsroom_airpurifier_ptc', 'on') | int %}
            {% set co2_shift = max(cooling_on, heating_on) * 150 + co2_delta * (1 - cooling_on) * (1 - heating_on)  %}
            {% if states('sensor.kidsroom_airpurifier_favorite_speed') | float <= 60 %}
              0
            {% elif states('sensor.kidsroom_airpurifier_favorite_speed') | float <= 70 %}
              {{ 600 + co2_shift }}
            {% elif states('sensor.kidsroom_airpurifier_favorite_speed') | float <= 80 %}
              {{ 650 + co2_shift }}
            {% elif states('sensor.kidsroom_airpurifier_favorite_speed') | float <= 90 %}
              {{ 700 + co2_shift }}
            {% elif states('sensor.kidsroom_airpurifier_favorite_speed') | float <= 100 %}
              {{ 750 + co2_shift }}
            {% elif states('sensor.kidsroom_airpurifier_favorite_speed') | float <= 110 %}
              {{ 800 + co2_shift }}
            {% elif states('sensor.kidsroom_airpurifier_favorite_speed') | float <= 120 %}
              {{ 900 + co2_shift }}
            {% elif states('sensor.kidsroom_airpurifier_favorite_speed') | float <= 130 %}
              {{ 950 + co2_shift }}
            {% else %}
              1200
            {% endif %}

        - name: "kidsroom_airpurifier_speed_max_co2"
          unique_id: kidsroom_airpurifier_speed_max_co2
          default_entity_id: sensor.kidsroom_airpurifier_speed_max_co2
          availability: >
            {% set valid_speed = states('sensor.kidsroom_airpurifier_favorite_speed') | float(0) >= 60 %}
            {% set valid_temp = states('sensor.kidsroom_average_temperature') | float(0) > 0 %}
            {{ valid_speed and valid_temp }}
          state: >
            {% set co2_delta = states('sensor.kidsroom_airpurifier_target_co2_delta') | float(0) %}
            {% set cooling_on = is_state('binary_sensor.kidsroom_ac_is_cooling', 'on') | int %}
            {% set heating_on = is_state('switch.kidsroom_airpurifier_ptc', 'on') | int %}
            {% set co2_shift = max(cooling_on, heating_on) * 150 + co2_delta * (1 - cooling_on) * (1 - heating_on)  %}
            {% if states('sensor.kidsroom_airpurifier_favorite_speed') | float <= 60 %}
              {{ 600 + co2_shift }}
            {% elif states('sensor.kidsroom_airpurifier_favorite_speed') | float <= 70 %}
              {{ 650 + co2_shift }}
            {% elif states('sensor.kidsroom_airpurifier_favorite_speed') | float <= 80 %}
              {{ 700 + co2_shift }}
            {% elif states('sensor.kidsroom_airpurifier_favorite_speed') | float <= 90 %}
              {{ 750 + co2_shift }}
            {% elif states('sensor.kidsroom_airpurifier_favorite_speed') | float <= 100 %}
              {{ 800 + co2_shift }}
            {% elif states('sensor.kidsroom_airpurifier_favorite_speed') | float <= 110 %}
              {{ 900 + co2_shift }}
            {% elif states('sensor.kidsroom_airpurifier_favorite_speed') | float <= 120 %}
              {{ 950 + co2_shift }}
            {% elif states('sensor.kidsroom_airpurifier_favorite_speed') | float <= 130 %}
              1200
            {% else %}
              5000
            {% endif %}

        - name: "kidsroom_airpurifier_next_speed"
          unique_id: kidsroom_airpurifier_next_speed
          default_entity_id: sensor.kidsroom_airpurifier_next_speed
          availability: "{{ states('sensor.kidsroom_airpurifier_favorite_speed') | float(0) >= 60 }}"
          state: >
            {% if states('sensor.kidsroom_airpurifier_favorite_speed') | float <= 60 %}
              70
            {% elif states('sensor.kidsroom_airpurifier_favorite_speed') | float <= 70 %}
              80
            {% elif states('sensor.kidsroom_airpurifier_favorite_speed') | float <= 80 %}
              90
            {% elif states('sensor.kidsroom_airpurifier_favorite_speed') | float <= 90 %}
              100
            {% elif states('sensor.kidsroom_airpurifier_favorite_speed') | float <= 100 %}
              110
            {% elif states('sensor.kidsroom_airpurifier_favorite_speed') | float <= 110 %}
              120
            {% elif states('sensor.kidsroom_airpurifier_favorite_speed') | float <= 120 %}
              130
            {% else %}
              150
            {% endif %}

        - name: "kidsroom_airpurifier_previous_speed"
          unique_id: kidsroom_airpurifier_previous_speed
          default_entity_id: sensor.kidsroom_airpurifier_previous_speed
          availability: "{{ states('sensor.kidsroom_airpurifier_favorite_speed') | float(0) >= 60 }}"
          state: >
            {% if states('sensor.kidsroom_airpurifier_favorite_speed') | float <= 70 %}
              60
            {% elif states('sensor.kidsroom_airpurifier_favorite_speed') | float <= 80 %}
              70
            {% elif states('sensor.kidsroom_airpurifier_favorite_speed') | float <= 90 %}
              80
            {% elif states('sensor.kidsroom_airpurifier_favorite_speed') | float <= 100 %}
              90
            {% elif states('sensor.kidsroom_airpurifier_favorite_speed') | float <= 110 %}
              100
            {% elif states('sensor.kidsroom_airpurifier_favorite_speed') | float <= 120 %}
              110
            {% elif states('sensor.kidsroom_airpurifier_favorite_speed') | float <= 130 %}
              120
            {% else %}
              130
            {% endif %}

        - name: "kidsroom_airpurifier_favourite_speed_needs_changes"
          unique_id: kidsroom_airpurifier_favourite_speed_needs_changes
          default_entity_id: sensor.kidsroom_airpurifier_favourite_speed_needs_changes
          availability: >
            {% set valid_min_co2 = states('sensor.kidsroom_airpurifier_speed_min_co2') | float(-1) >= 0 %}
            {% set valid_max_co2 = states('sensor.kidsroom_airpurifier_speed_max_co2') | float(-1) >= 0 %}
            {% set valid_co2 = states('sensor.kidsroom_co2') | float(0) > 0 %}
            {{ valid_min_co2 and valid_max_co2 and valid_co2 }}
          state: >
            {% set hi = (states('sensor.kidsroom_airpurifier_speed_max_co2') | float) + 15 %}
            {% set lo = (states('sensor.kidsroom_airpurifier_speed_min_co2') | float) - 35 %}
            {% set co2 = states('sensor.kidsroom_co2') | float %}
            {% if co2 > hi %}
              up
            {% elif co2 < lo %}
              down
            {% else %}
              keep
            {% endif %}

      binary_sensor:
        - name: "Фиксированная скорость бризера в детской"
          unique_id: kidsroom_airpurifier_favourite_speed_fixed
          default_entity_id: binary_sensor.kidsroom_airpurifier_favourite_speed_fixed
          state: >
            {% set smart_control_off = is_state('switch.kidsroom_airpurifier_favourite_speed_smart_control', 'off') %}
            {% set tmp_fixed_speed = is_state('switch.kidsroom_airpurifier_favourite_speed_temporary_fixed', 'on') %}
            {{ smart_control_off or tmp_fixed_speed }}

      switch:
        - name: "Дисплей бризера в детской"
          unique_id: kidsroom_airpurifier_display
          default_entity_id: switch.kidsroom_airpurifier_display
          state: "{{ is_state_attr('fan.mijia_airpurifier_kidsroom', 'display', True) }}"
          turn_on:
            action: xiaomi_miio_airpurifier.fan_set_display_on
            target:
              entity_id: fan.mijia_airpurifier_kidsroom
          turn_off:
            action: xiaomi_miio_airpurifier.fan_set_display_off
            target:
              entity_id: fan.mijia_airpurifier_kidsroom
          icon: mdi:lightbulb-outline

        - name: "Звук бризера в детской"
          unique_id: kidsroom_airpurifier_buzzer
          default_entity_id: switch.kidsroom_airpurifier_buzzer
          state: "{{ is_state_attr('fan.mijia_airpurifier_kidsroom', 'buzzer', True) }}"
          turn_on:
            action: xiaomi_miio_airpurifier.fan_set_buzzer_on
            target:
              entity_id: fan.mijia_airpurifier_kidsroom
          turn_off:
            action: xiaomi_miio_airpurifier.fan_set_buzzer_off
            target:
              entity_id: fan.mijia_airpurifier_kidsroom
          icon: mdi:volume-high

        - name: "Проветривание в детской"
          unique_id: kidsroom_airpurifier_forced_ventilation
          default_entity_id: switch.kidsroom_airpurifier_forced_ventilation
          state: >
            {% set favorite_mode = is_state_attr('fan.mijia_airpurifier_kidsroom', 'preset_mode', 'Favorite') %}
            {% set max_speed_flag = states('sensor.kidsroom_airpurifier_favorite_speed') | int(0) == 150 %}
            {% set fixed_speed_timer_on = is_state('timer.kidsroom_airpurifier_fixed_speed', 'active') %}
            {{ favorite_mode and max_speed_flag and fixed_speed_timer_on }}
          turn_on:
            - action: fan.turn_on
              target:
                entity_id: fan.mijia_airpurifier_kidsroom
            - action: input_select.select_option
              target:
                entity_id: input_select.kidsroom_airpurifier_mode
              data:
                option: "Favorite"
            - action: input_number.set_value
              target:
                entity_id: input_number.kidsroom_airpurifier_favorite_speed
              data:
                value: 150
            - action: timer.start
              target:
                entity_id: timer.kidsroom_airpurifier_fixed_speed
          turn_off:
            action: timer.finish
            target:
              entity_id: timer.kidsroom_airpurifier_fixed_speed
          icon: mdi:weather-windy

        - name: "Умное управление скоростью бризера в детской"
          unique_id: kidsroom_airpurifier_favourite_speed_smart_control
          default_entity_id: switch.kidsroom_airpurifier_favourite_speed_smart_control
          state: >
            {% set favorite_mode = is_state_attr('fan.mijia_airpurifier_kidsroom', 'preset_mode', 'Favorite') %}
            {% set smart_control = is_state('input_boolean.kidsroom_airpurifier_favourite_speed_smart_control', 'on') %}
            {{ favorite_mode and smart_control }}
          turn_on:
            action: input_boolean.turn_on
            target:
              entity_id: input_boolean.kidsroom_airpurifier_favourite_speed_smart_control
          turn_off:
            action: input_boolean.turn_off
            target:
              entity_id: input_boolean.kidsroom_airpurifier_favourite_speed_smart_control
          icon: mdi:fan-auto

        - name: "Фиксированная скорость бризера в детской"
          unique_id: kidsroom_airpurifier_favourite_speed_temporary_fixed
          default_entity_id: switch.kidsroom_airpurifier_favourite_speed_temporary_fixed
          state: >
            {% set favorite_mode = is_state_attr('fan.mijia_airpurifier_kidsroom', 'preset_mode', 'Favorite') %}
            {% set smart_control = is_state('switch.kidsroom_airpurifier_favourite_speed_smart_control', 'on') %}
            {% set fixed_speed_timer_on = is_state('timer.kidsroom_airpurifier_fixed_speed', 'active') %}
            {{ favorite_mode and smart_control and fixed_speed_timer_on }}
          turn_on:
            action: timer.start
            target:
              entity_id: timer.kidsroom_airpurifier_fixed_speed
          turn_off:
            action: timer.finish
            target:
              entity_id: timer.kidsroom_airpurifier_fixed_speed
          icon: mdi:speedometer

  automation:
    - id: "Выбор режима работы бризера в детской"
      alias: select_kidsroom_airpurifier_preset_mode
      trigger:
        - entity_id: input_select.kidsroom_airpurifier_mode
          platform: state
      action:
        - service: fan.set_preset_mode
          entity_id: fan.mijia_airpurifier_kidsroom
          data_template:
            preset_mode: "{{ trigger.to_state.state }}"

    - id: "Отслеживание режима работы бризера в детской"
      alias: tracking_kidsroom_airpurifier_preset_mode
      trigger:
        - platform: state
          entity_id: sensor.kidsroom_airpurifier_preset_mode
      condition:
        - condition: template
          value_template: "{{ trigger.to_state.state is defined and trigger.to_state.state not in ['unknown', 'unavailable'] }}"
      action:
        - service: input_select.select_option
          entity_id: input_select.kidsroom_airpurifier_mode
          data_template:
            option: "{{ trigger.to_state.state }}"

    - id: "Выбор скорости потока воздуха для бризера в детской"
      alias: select_kidsroom_airpurifier_speed
      trigger:
        - platform: state
          entity_id: input_number.kidsroom_airpurifier_favorite_speed
      action:
        - service: xiaomi_miio_airpurifier.fan_set_favorite_speed
          entity_id: fan.mijia_airpurifier_kidsroom
          data_template:
            speed: "{{ trigger.to_state.state }}"

    - id: "Отслеживание скорости потока воздуха для бризера в детской"
      alias: tracking_kidsroom_airpurifier_speed
      trigger:
        - platform: state
          entity_id: sensor.kidsroom_airpurifier_favorite_speed
      condition:
        - condition: template
          value_template: "{{ trigger.to_state.state | int(0) > 0 }}"
      action:
        - service: input_number.set_value
          entity_id: input_number.kidsroom_airpurifier_favorite_speed
          data_template:
            value: "{{ trigger.to_state.state | int }}"

    - id: "Умный контроль скорости работы бризера в детской"
      alias: kidsroom_airpurifier_favourite_speed_smart_control
      initial_state: true
      trigger:
        - platform: time_pattern
          minutes: "/2"
      condition:
        - condition: state
          entity_id: sensor.kidsroom_airpurifier_favourite_speed_needs_changes
          state:
            - "up"
            - "down"
        - condition: state
          entity_id: switch.kidsroom_airpurifier_favourite_speed_smart_control
          state: "on"
        - condition: state
          entity_id: switch.kidsroom_airpurifier_favourite_speed_temporary_fixed
          state: "off"
        - condition: template
          value_template: >
            {% set valid_prev_speed = states('sensor.kidsroom_airpurifier_previous_speed') | int(0) > 0 %}
            {% set valid_next_speed = states('sensor.kidsroom_airpurifier_previous_speed') | int(0) > 0 %}
            {{ valid_prev_speed and valid_next_speed }}
      action:
        - service: input_number.set_value
          entity_id: input_number.kidsroom_airpurifier_favorite_speed
          data_template:
            value: >
              {% if is_state('sensor.kidsroom_airpurifier_favourite_speed_needs_changes', 'up') %}
                {{ states('sensor.kidsroom_airpurifier_next_speed') | int }}
              {% else %}
                {{ states('sensor.kidsroom_airpurifier_previous_speed') | int }}
              {% endif %}

    - id: "Включение бризера в детской"
      alias: kidsroom_airpurifier_turn_on
      initial_state: true
      trigger:
        - platform: time_pattern
          minutes: "/10"
        - platform: state
          entity_id: switch.somebody_home
          from: "off"
          to: "on"
      condition:
        - condition: state
          entity_id: switch.somebody_home
          state: "on"
        - condition: state
          entity_id: fan.mijia_airpurifier_kidsroom
          state: "off"
        - condition: template
          value_template: >
            {% set co2 = states('sensor.kidsroom_co2') | float(600) %}
            {% set threshold = states('sensor.breezers_turnon_co2_threshold') | float(600) %}
            {% set somebody_home = is_state('switch.somebody_home', 'on') | int %}
            {% set co2_delta = states('sensor.kidsroom_airpurifier_target_co2_delta') | float(0) %}
            {{ co2 > threshold + 50 + somebody_home * co2_delta }}
        - condition: state
          entity_id: input_boolean.kidsroom_airpurifier_favourite_speed_smart_control
          state: "on"
      action:
        - service: fan.turn_on
          entity_id: fan.mijia_airpurifier_kidsroom
        - delay: 00:00:30
        - if:
            - condition: state
              entity_id: fan.mijia_airpurifier_kidsroom
              state: "on"
          then:
            - service: notify.tg_bot
              data:
                message: |
                  {{ '\U0001F4A8' }} Бризер в детской включен.
                  {{ '\U0001F321' }} Температура {{ states('sensor.kidsroom_average_temperature') | round(1) }}°C
                  {{ '\U0001F4A7' }} Влажность {{ states('sensor.kidsroom_average_humidity') | round(1) }}%
                  {{ '\U0000269B' }} CO2 {{ states('sensor.kidsroom_co2') | int }}ppm

    - id: "Выключение бризера в детской"
      alias: kidsroom_airpurifier_turn_off
      initial_state: true
      trigger:
        - platform: time_pattern
          minutes: "/30"
        - platform: state
          entity_id: switch.somebody_home
          from: "on"
          to: "off"
      condition:
        - condition: state
          entity_id: fan.mijia_airpurifier_kidsroom
          state: "on"
        - condition: template
          value_template: >
            {% set co2 = states('sensor.kidsroom_co2') | float(600) %}
            {% set threshold = states('sensor.breezers_turnoff_co2_threshold') | float(600) %}
            {% set somebody_home = is_state('switch.somebody_home', 'on') | int %}
            {% set co2_delta = states('sensor.kidsroom_airpurifier_target_co2_delta') | float(0) %}
            {{ co2 < threshold + somebody_home * co2_delta }}
        - condition: state
          entity_id:
            - timer.kidsroom_airpurifier_fixed_speed
          state: "idle"
        - condition: state
          entity_id: switch.kidsroom_airpurifier_favourite_speed_smart_control
          state: "on"
        - condition: template
          value_template: >
            {% set outside_target_delta = states('sensor.outside_target_temperature_delta') | float(-99) %}
            {% set inside_target_delta = states('sensor.kidsroom_current_target_temperature_delta') | float(99) %}
            {% set somebody_home = states('switch.somebody_home') | bool(True) %}
            {% set needs_cooling_from_outside = outside_target_delta < -10 and inside_target_delta > 1.5 and somebody_home %}
            {{ not needs_cooling_from_outside }}
      action:
        - service: switch.turn_off
          entity_id: switch.kidsroom_airpurifier_ptc
          continue_on_error: true
        - service: fan.turn_off
          entity_id: fan.mijia_airpurifier_kidsroom
        - delay: 00:00:45
        - if:
            - condition: state
              entity_id: fan.mijia_airpurifier_kidsroom
              state: "off"
          then:
            - service: notify.tg_bot
              data:
                message: |
                  {{ '\U0001F4A8' }} Бризер в детской выключен.
                  {{ '\U0001F321' }} Температура {{ states('sensor.kidsroom_average_temperature') | round(1) }}°C
                  {{ '\U0001F4A7' }} Влажность {{ states('sensor.kidsroom_average_humidity') | round(1) }}%
                  {{ '\U0000269B' }} CO2 {{ states('sensor.kidsroom_co2') | int }}ppm
          else:
            - service: notify.tg_bot
              data:
                message: |
                  {{ '\U000026A0' }} Не получилось выключить бризер в детской, статус {{ states('fan.mijia_airpurifier_kidsroom') }}.

    - id: "Регулярное проветривание бризера в детской"
      alias: kidsroom_periodic_ventilation
      initial_state: true
      trigger:
        - platform: state
          entity_id: fan.mijia_airpurifier_kidsroom
          from: "on"
          for:
            hours: 24
      condition:
        - condition: state
          entity_id: switch.somebody_home
          state: "off"
        - condition: state
          entity_id: fan.mijia_airpurifier_kidsroom
          state: "off"
        - condition: state
          entity_id: input_boolean.kidsroom_airpurifier_favourite_speed_smart_control
          state: "on"
      action:
        - service: fan.turn_on
          entity_id: fan.mijia_airpurifier_kidsroom
        - service: input_select.select_option
          entity_id: input_select.kidsroom_airpurifier_mode
          data:
            option: "Favorite"
        - service: input_number.set_value
          entity_id: input_number.kidsroom_airpurifier_favorite_speed
          data:
            value: 100
        - service: timer.start
          entity_id: timer.kidsroom_airpurifier_fixed_speed
