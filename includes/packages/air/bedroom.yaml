bedroom_air:
  input_boolean:
    bedroom_airpurifier_favourite_speed_smart_control:
      name: "Умное управление скоростью бризера в спальне"

  input_number:
    bedroom_airpurifier_favorite_speed:
      name: "Установленная скорость бризера в спальне"
      min: 60
      max: 150
      step: 1
      icon: mdi:weather-windy

  input_select:
    bedroom_airpurifier_mode:
      name: "Режим работы бризера в спальне"
      options:
        - Auto
        - Sleep
        - Favorite

  timer:
    bedroom_airpurifier_fixed_speed:
      name: "Фиксированная скорость бризера в спальне, осталось "
      duration: 1800

  template:
    - sensor:
        - name: "Qingping air2 CO²"
          unique_id: bedroom_co2
          default_entity_id: sensor.bedroom_co2
          device_class: carbon_dioxide
          unit_of_measurement: "ppm"
          availability: >
            {% set value = states('sensor.cgllc_cgs2_84ac_co2_density') | float(0) %}
            {{ value > 0 and value < 10000 }}
          state: "{{ states('sensor.cgllc_cgs2_84ac_co2_density') }}"
          icon: mdi:molecule-co2

        - name: "Qingping air2 tVOC"
          unique_id: bedroom_tvoc
          default_entity_id: sensor.bedroom_tvoc
          device_class: volatile_organic_compounds
          unit_of_measurement: "ppb"
          availability: >
            {% set value = states('sensor.cgllc_cgs2_84ac_tvoc_density') | float(-1) %}
            {{ value >= 0 and value < 1000 }}
          state: >
            {% set index = states('sensor.cgllc_cgs2_84ac_tvoc_density') | float %}
            {% if index < 37 %}
              {{ (index * 4.5 + 52) | round(0) }}
            {% elif index < 120 %}
              {{ (index * 5.3 + 24) | round(0) }}
            {% else %}
              {{ (index * 7.75 - 270) | round(0) }}
            {% endif %}
          icon: mdi:atom

        - name: "Qingping air2 PM2.5"
          unique_id: bedroom_pm25
          default_entity_id: sensor.bedroom_pm25
          device_class: pm25
          unit_of_measurement: "µg/m³"
          availability: >
            {% set value = states('sensor.cgllc_cgs2_84ac_pm25_density') | float(-1) %}
            {{ value >= 0 and value < 1000 }}
          state: "{{ states('sensor.cgllc_cgs2_84ac_pm25_density') }}"
          icon: mdi:molecule

        - name: "Qingping air2 PM10"
          unique_id: bedroom_pm10
          default_entity_id: sensor.bedroom_pm10
          device_class: pm10
          unit_of_measurement: "µg/m³"
          availability: >
            {% set value = states('sensor.cgllc_cgs2_84ac_pm10_density') | float(-1) %}
            {{ value >= 0 and value < 1000 }}
          state: "{{ states('sensor.cgllc_cgs2_84ac_pm10_density') }}"
          icon: mdi:grain

        - name: "Qingping air2 Температура"
          unique_id: qingping_air2_temperature
          default_entity_id: sensor.qingping_air2_temperature
          device_class: temperature
          unit_of_measurement: "°C"
          availability: >
            {% set value = states('sensor.cgllc_cgs2_84ac_temperature') | float(0) %}
            {{ value > 0 and value < 100 }}
          state: "{{ states('sensor.cgllc_cgs2_84ac_temperature') }}"

        - name: "Bedroom aqara Температура"
          unique_id: bedroom_aqara_temperature
          default_entity_id: sensor.bedroom_aqara_temperature
          device_class: temperature
          unit_of_measurement: "°C"
          availability: >
            {% set value = states('sensor.bedroom_aqara_air_sensor_temperature') | float(0) %}
            {{ value > 10 and value < 100 }}
          state: "{{ states('sensor.bedroom_aqara_air_sensor_temperature') }}"

        - name: "Температура"
          unique_id: bedroom_average_temperature
          default_entity_id: sensor.bedroom_average_temperature
          device_class: temperature
          unit_of_measurement: "°C"
          availability: >
            {% set temps = [
              states('sensor.qingping_air2_temperature'),
              states('sensor.bedroom_aqara_temperature')
            ] %}
            {{ temps | reject('equalto', 'unavailable') | list | count == 2 }}
          state: >
            {% set temps = [
              states('sensor.qingping_air2_temperature'),
              states('sensor.qingping_air2_temperature'),
              states('sensor.bedroom_aqara_temperature')
            ] %}
            {% set filtered_temps = temps | reject('equalto', 'unavailable') | map('float') | list %}
            {{ (filtered_temps | sum / filtered_temps | count) | round(2) }}

        - name: "Qingping air2 Влажность"
          unique_id: qingping_air2_humidity
          default_entity_id: sensor.qingping_air2_humidity
          device_class: humidity
          unit_of_measurement: "%"
          availability: >
            {% set value = states('sensor.cgllc_cgs2_84ac_relative_humidity') | float(0) %}
            {{ value > 0 and value < 100 }}
          state: "{{ states('sensor.cgllc_cgs2_84ac_relative_humidity') }}"

        - name: "Bedroom aqara Влажность"
          unique_id: bedroom_aqara_humidity
          default_entity_id: sensor.bedroom_aqara_humidity
          device_class: humidity
          unit_of_measurement: "%"
          availability: >
            {% set value = states('sensor.bedroom_aqara_air_sensor_humidity') | float(0) %}
            {{ value > 5 and value < 100 }}
          state: "{{ states('sensor.bedroom_aqara_air_sensor_humidity') }}"

        - name: "Влажность"
          unique_id: bedroom_average_humidity
          default_entity_id: sensor.bedroom_average_humidity
          device_class: humidity
          unit_of_measurement: "%"
          availability: >
            {% set hums = [
              states('sensor.qingping_air2_humidity'),
              states('sensor.bedroom_aqara_humidity')
            ] %}
            {{ hums | reject('equalto', 'unavailable') | list | count == 2 }}
          state: >
            {% set hums = [
              states('sensor.qingping_air2_humidity'),
              states('sensor.bedroom_aqara_humidity')
            ] %}
            {% set filtered_hums = hums | reject('equalto', 'unavailable') | map('float') | list %}
            {{ (filtered_hums | sum / filtered_hums | count) | round(2) }}

        - name: "Mi Fresh Air Bedroom CO²"
          unique_id: bedroom_airpurifier_co2
          default_entity_id: sensor.bedroom_airpurifier_co2
          device_class: carbon_dioxide
          unit_of_measurement: "ppm"
          state: "{{ state_attr('fan.mijia_airpurifier_bedroom', 'co2') }}"
          icon: mdi:molecule-co2

        - name: "Mi Fresh Air Bedroom PM2.5"
          unique_id: bedroom_airpurifier_pm25
          default_entity_id: sensor.bedroom_airpurifier_pm25
          device_class: pm25
          unit_of_measurement: "µg/m³"
          state: "{{ state_attr('fan.mijia_airpurifier_bedroom', 'pm25') }}"
          icon: mdi:grain

        - name: "Mi Fresh Air Bedroom Температура"
          unique_id: bedroom_airpurifier_temperature
          default_entity_id: sensor.bedroom_airpurifier_temperature
          device_class: temperature
          unit_of_measurement: "°C"
          state: "{{ state_attr('fan.mijia_airpurifier_bedroom', 'temperature') }}"
          icon: mdi:thermometer

        - name: "Mi Fresh Air Bedroom Текущая скорость"
          unique_id: bedroom_airpurifier_current_speed
          default_entity_id: sensor.bedroom_airpurifier_current_speed
          device_class: volume_flow_rate
          unit_of_measurement: "m³/h"
          state: "{{ state_attr('fan.mijia_airpurifier_bedroom', 'control_speed') }}"
          icon: mdi:speedometer

        - name: "Mi Fresh Air Bedroom Установленная скорость"
          unique_id: bedroom_airpurifier_favorite_speed
          default_entity_id: sensor.bedroom_airpurifier_favorite_speed
          device_class: volume_flow_rate
          unit_of_measurement: "m³/h"
          state: "{{ state_attr('fan.mijia_airpurifier_bedroom', 'favorite_speed') }}"
          icon: mdi:speedometer

        - name: "Mi Fresh Air Bedroom Состояние фильтра"
          unique_id: bedroom_airpurifier_dust_filter_life_remaining
          default_entity_id: sensor.bedroom_airpurifier_dust_filter_life_remaining
          unit_of_measurement: "%"
          state: "{{ state_attr('fan.mijia_airpurifier_bedroom', 'dust_filter_life_remaining') }}"
          icon: mdi:air-filter

        - name: "Mi Fresh Air Bedroom Дней до замены фильтра"
          unique_id: bedroom_airpurifier_dust_filter_life_remaining_days
          default_entity_id: sensor.bedroom_airpurifier_dust_filter_life_remaining_days
          state: "{{ state_attr('fan.mijia_airpurifier_bedroom', 'dust_filter_life_remaining_days') }}"
          icon: mdi:air-filter

        - name: "Mi Fresh Air Bedroom Режим работы"
          unique_id: bedroom_airpurifier_preset_mode
          default_entity_id: sensor.bedroom_airpurifier_preset_mode
          state: "{{ state_attr('fan.mijia_airpurifier_bedroom', 'preset_mode') }}"

        - name: "Разница текущей и желаемой температур в спальне"
          unique_id: bedroom_current_target_temperature_delta
          default_entity_id: sensor.bedroom_current_target_temperature_delta
          device_class: temperature
          unit_of_measurement: "°C"
          availability: >
            {{ states('sensor.bedroom_average_temperature') | float(0) > 0 }}
          state: >
            {{ states('sensor.bedroom_average_temperature') | float(22) - states('input_number.target_temperature') | float(22) }}

        - name: "Поправка к скорости бризера в спальне"
          unique_id: bedroom_airpurifier_target_co2_delta
          default_entity_id: sensor.bedroom_airpurifier_target_co2_delta
          state: >
            {% set temp_delta_ct = states('sensor.bedroom_current_target_temperature_delta') | float(1) %}
            {% set temp_delta_ot = states('sensor.outside_target_temperature_delta') | float(1) %}
            {% set x = temp_delta_ot | abs %}
            {% set k = 0.05 %}
            {% set exp_2kx = e**(-2*k*x) %}
            {% set tahn_temp_delta_ot = (1 - exp_2kx) / (1 + exp_2kx) %}
            {% set temp_delta_product = temp_delta_ct * temp_delta_ot %}
            {% set temp_delta_sign = 0 if temp_delta_product == 0 else temp_delta_product / (temp_delta_product | abs) %}
            {{ min(150, (temp_delta_sign * (temp_delta_ct | abs)**1.5 + 10 * tahn_temp_delta_ot) | round * 10) }}

        - name: "bedroom_airpurifier_speed_min_co2"
          unique_id: bedroom_airpurifier_speed_min_co2
          default_entity_id: sensor.bedroom_airpurifier_speed_min_co2
          availability: >
            {% set valid_speed = states('sensor.bedroom_airpurifier_favorite_speed') | float(0) >= 60 %}
            {% set valid_temp = states('sensor.bedroom_average_temperature') | float(0) > 0 %}
            {{ valid_speed and valid_temp }}
          state: >
            {% set co2_delta = states('sensor.bedroom_airpurifier_target_co2_delta') | float(0) %}
            {% set cooling_on = is_state('binary_sensor.bedroom_ac_is_cooling', 'on') | int %}
            {% set heating_on = is_state('switch.bedroom_airpurifier_ptc', 'on') | int %}
            {% set co2_shift = max(cooling_on, heating_on) * 150 + co2_delta * (1 - cooling_on) * (1 - heating_on)  %}
            {% if states('sensor.bedroom_airpurifier_favorite_speed') | float <= 60 %}
              0
            {% elif states('sensor.bedroom_airpurifier_favorite_speed') | float <= 70 %}
              {{ 600 + co2_shift }}
            {% elif states('sensor.bedroom_airpurifier_favorite_speed') | float <= 80 %}
              {{ 650 + co2_shift }}
            {% elif states('sensor.bedroom_airpurifier_favorite_speed') | float <= 90 %}
              {{ 700 + co2_shift }}
            {% elif states('sensor.bedroom_airpurifier_favorite_speed') | float <= 100 %}
              {{ 750 + co2_shift }}
            {% elif states('sensor.bedroom_airpurifier_favorite_speed') | float <= 110 %}
              {{ 800 + co2_shift }}
            {% elif states('sensor.bedroom_airpurifier_favorite_speed') | float <= 120 %}
              {{ 900 + co2_shift }}
            {% elif states('sensor.bedroom_airpurifier_favorite_speed') | float <= 130 %}
              {{ 950 + co2_shift }}
            {% else %}
              1200
            {% endif %}

        - name: "bedroom_airpurifier_speed_max_co2"
          unique_id: bedroom_airpurifier_speed_max_co2
          default_entity_id: sensor.bedroom_airpurifier_speed_max_co2
          availability: >
            {% set valid_speed = states('sensor.bedroom_airpurifier_favorite_speed') | float(0) >= 60 %}
            {% set valid_temp = states('sensor.bedroom_average_temperature') | float(0) > 0 %}
            {{ valid_speed and valid_temp }}
          state: >
            {% set co2_delta = states('sensor.bedroom_airpurifier_target_co2_delta') | float(0) %}
            {% set cooling_on = is_state('binary_sensor.bedroom_ac_is_cooling', 'on') | int %}
            {% set heating_on = is_state('switch.bedroom_airpurifier_ptc', 'on') | int %}
            {% set co2_shift = max(cooling_on, heating_on) * 150 + co2_delta * (1 - cooling_on) * (1 - heating_on)  %}
            {% if states('sensor.bedroom_airpurifier_favorite_speed') | float <= 60 %}
              {{ 600 + co2_shift }}
            {% elif states('sensor.bedroom_airpurifier_favorite_speed') | float <= 70 %}
              {{ 650 + co2_shift }}
            {% elif states('sensor.bedroom_airpurifier_favorite_speed') | float <= 80 %}
              {{ 700 + co2_shift }}
            {% elif states('sensor.bedroom_airpurifier_favorite_speed') | float <= 90 %}
              {{ 750 + co2_shift }}
            {% elif states('sensor.bedroom_airpurifier_favorite_speed') | float <= 100 %}
              {{ 800 + co2_shift }}
            {% elif states('sensor.bedroom_airpurifier_favorite_speed') | float <= 110 %}
              {{ 900 + co2_shift }}
            {% elif states('sensor.bedroom_airpurifier_favorite_speed') | float <= 120 %}
              {{ 950 + co2_shift }}
            {% elif states('sensor.bedroom_airpurifier_favorite_speed') | float <= 130 %}
              1200
            {% else %}
              5000
            {% endif %}

        - name: "bedroom_airpurifier_next_speed"
          unique_id: bedroom_airpurifier_next_speed
          default_entity_id: sensor.bedroom_airpurifier_next_speed
          availability: "{{ states('sensor.bedroom_airpurifier_favorite_speed') | float(0) >= 60 }}"
          state: >
            {% if states('sensor.bedroom_airpurifier_favorite_speed') | float <= 60 %}
              70
            {% elif states('sensor.bedroom_airpurifier_favorite_speed') | float <= 70 %}
              80
            {% elif states('sensor.bedroom_airpurifier_favorite_speed') | float <= 80 %}
              90
            {% elif states('sensor.bedroom_airpurifier_favorite_speed') | float <= 90 %}
              100
            {% elif states('sensor.bedroom_airpurifier_favorite_speed') | float <= 100 %}
              110
            {% elif states('sensor.bedroom_airpurifier_favorite_speed') | float <= 110 %}
              120
            {% elif states('sensor.bedroom_airpurifier_favorite_speed') | float <= 120 %}
              130
            {% else %}
              150
            {% endif %}

        - name: "bedroom_airpurifier_previous_speed"
          unique_id: bedroom_airpurifier_previous_speed
          default_entity_id: sensor.bedroom_airpurifier_previous_speed
          availability: "{{ states('sensor.bedroom_airpurifier_favorite_speed') | float(0) >= 60 }}"
          state: >
            {% if states('sensor.bedroom_airpurifier_favorite_speed') | float <= 70 %}
              60
            {% elif states('sensor.bedroom_airpurifier_favorite_speed') | float <= 80 %}
              70
            {% elif states('sensor.bedroom_airpurifier_favorite_speed') | float <= 90 %}
              80
            {% elif states('sensor.bedroom_airpurifier_favorite_speed') | float <= 100 %}
              90
            {% elif states('sensor.bedroom_airpurifier_favorite_speed') | float <= 110 %}
              100
            {% elif states('sensor.bedroom_airpurifier_favorite_speed') | float <= 120 %}
              110
            {% elif states('sensor.bedroom_airpurifier_favorite_speed') | float <= 130 %}
              120
            {% else %}
              130
            {% endif %}

        - name: "bedroom_airpurifier_favourite_speed_needs_changes"
          unique_id: bedroom_airpurifier_favourite_speed_needs_changes
          default_entity_id: sensor.bedroom_airpurifier_favourite_speed_needs_changes
          availability: >
            {% set valid_min_co2 = states('sensor.bedroom_airpurifier_speed_min_co2') | float(-1) >= 0 %}
            {% set valid_max_co2 = states('sensor.bedroom_airpurifier_speed_max_co2') | float(-1) >= 0 %}
            {% set valid_co2 = states('sensor.bedroom_co2') | float(0) > 0 %}
            {{ valid_min_co2 and valid_max_co2 and valid_co2 }}
          state: >
            {% set hi = (states('sensor.bedroom_airpurifier_speed_max_co2') | float) + 15 %}
            {% set lo = (states('sensor.bedroom_airpurifier_speed_min_co2') | float) - 35 %}
            {% set co2 = states('sensor.bedroom_co2') | float %}
            {% if co2 > hi %}
              up
            {% elif co2 < lo %}
              down
            {% else %}
              keep
            {% endif %}

      binary_sensor:
        - name: "Фиксированная скорость бризера в спальне"
          unique_id: bedroom_airpurifier_favourite_speed_fixed
          default_entity_id: binary_sensor.bedroom_airpurifier_favourite_speed_fixed
          state: >
            {% set smart_control_off = is_state('switch.bedroom_airpurifier_favourite_speed_smart_control', 'off') %}
            {% set tmp_fixed_speed = is_state('switch.bedroom_airpurifier_favourite_speed_temporary_fixed', 'on') %}
            {{ smart_control_off or tmp_fixed_speed }}

      switch:
        - name: "Дисплей бризера в спальне"
          unique_id: bedroom_airpurifier_display
          default_entity_id: switch.bedroom_airpurifier_display
          state: "{{ is_state_attr('fan.mijia_airpurifier_bedroom', 'display', True) }}"
          turn_on:
            action: xiaomi_miio_airpurifier.fan_set_display_on
            target:
              entity_id: fan.mijia_airpurifier_bedroom
          turn_off:
            action: xiaomi_miio_airpurifier.fan_set_display_off
            target:
              entity_id: fan.mijia_airpurifier_bedroom
          icon: mdi:lightbulb-outline

        - name: "Звук бризера в спальне"
          unique_id: bedroom_airpurifier_buzzer
          default_entity_id: switch.bedroom_airpurifier_buzzer
          state: "{{ is_state_attr('fan.mijia_airpurifier_bedroom', 'buzzer', True) }}"
          turn_on:
            action: xiaomi_miio_airpurifier.fan_set_buzzer_on
            target:
              entity_id: fan.mijia_airpurifier_bedroom
          turn_off:
            action: xiaomi_miio_airpurifier.fan_set_buzzer_off
            target:
              entity_id: fan.mijia_airpurifier_bedroom
          icon: mdi:volume-high

        - name: "Проветривание в спальне"
          unique_id: bedroom_airpurifier_forced_ventilation
          default_entity_id: switch.bedroom_airpurifier_forced_ventilation
          state: >
            {% set favorite_mode = is_state_attr('fan.mijia_airpurifier_bedroom', 'preset_mode', 'Favorite') %}
            {% set max_speed_flag = states('sensor.bedroom_airpurifier_favorite_speed') | int(0) == 150 %}
            {% set fixed_speed_timer_on = is_state('timer.bedroom_airpurifier_fixed_speed', 'active') %}
            {{ favorite_mode and max_speed_flag and fixed_speed_timer_on }}
          turn_on:
            - action: fan.turn_on
              target:
                entity_id: fan.mijia_airpurifier_bedroom
            - action: input_select.select_option
              target:
                entity_id: input_select.bedroom_airpurifier_mode
              data:
                option: "Favorite"
            - action: input_number.set_value
              target:
                entity_id: input_number.bedroom_airpurifier_favorite_speed
              data:
                value: 150
            - action: timer.start
              target:
                entity_id: timer.bedroom_airpurifier_fixed_speed
          turn_off:
            action: timer.finish
            target:
              entity_id: timer.bedroom_airpurifier_fixed_speed
          icon: mdi:weather-windy

        - name: "Умное управление скоростью бризера в спальне"
          unique_id: bedroom_airpurifier_favourite_speed_smart_control
          default_entity_id: switch.bedroom_airpurifier_favourite_speed_smart_control
          state: >
            {% set favorite_mode = is_state_attr('fan.mijia_airpurifier_bedroom', 'preset_mode', 'Favorite') %}
            {% set smart_control = is_state('input_boolean.bedroom_airpurifier_favourite_speed_smart_control', 'on') %}
            {{ favorite_mode and smart_control }}
          turn_on:
            action: input_boolean.turn_on
            target:
              entity_id: input_boolean.bedroom_airpurifier_favourite_speed_smart_control
          turn_off:
            action: input_boolean.turn_off
            target:
              entity_id: input_boolean.bedroom_airpurifier_favourite_speed_smart_control
          icon: mdi:fan-auto

        - name: "Фиксированная скорость бризера в спальне"
          unique_id: bedroom_airpurifier_favourite_speed_temporary_fixed
          default_entity_id: switch.bedroom_airpurifier_favourite_speed_temporary_fixed
          state: >
            {% set favorite_mode = is_state_attr('fan.mijia_airpurifier_bedroom', 'preset_mode', 'Favorite') %}
            {% set smart_control = is_state('switch.bedroom_airpurifier_favourite_speed_smart_control', 'on') %}
            {% set fixed_speed_timer_on = is_state('timer.bedroom_airpurifier_fixed_speed', 'active') %}
            {{ favorite_mode and smart_control and fixed_speed_timer_on }}
          turn_on:
            action: timer.start
            target:
              entity_id: timer.bedroom_airpurifier_fixed_speed
          turn_off:
            action: timer.finish
            target:
              entity_id: timer.bedroom_airpurifier_fixed_speed
          icon: mdi:speedometer

  automation:
    - id: "Выбор режима работы бризера в спальне"
      alias: select_bedroom_airpurifier_preset_mode
      trigger:
        - entity_id: input_select.bedroom_airpurifier_mode
          platform: state
      action:
        - service: fan.set_preset_mode
          entity_id: fan.mijia_airpurifier_bedroom
          data_template:
            preset_mode: "{{ trigger.to_state.state }}"

    - id: "Отслеживание режима работы бризера в спальне"
      alias: tracking_bedroom_airpurifier_preset_mode
      trigger:
        - platform: state
          entity_id: sensor.bedroom_airpurifier_preset_mode
      condition:
        - condition: template
          value_template: "{{ trigger.to_state.state is defined and trigger.to_state.state not in ['unknown', 'unavailable'] }}"
      action:
        - service: input_select.select_option
          entity_id: input_select.bedroom_airpurifier_mode
          data_template:
            option: "{{ trigger.to_state.state }}"

    - id: "Выбор скорости потока воздуха для бризера в спальне"
      alias: select_bedroom_airpurifier_speed
      trigger:
        - platform: state
          entity_id: input_number.bedroom_airpurifier_favorite_speed
      action:
        - service: xiaomi_miio_airpurifier.fan_set_favorite_speed
          entity_id: fan.mijia_airpurifier_bedroom
          data_template:
            speed: "{{ trigger.to_state.state }}"

    - id: "Отслеживание скорости потока воздуха для бризера в спальне"
      alias: tracking_bedroom_airpurifier_speed
      trigger:
        - platform: state
          entity_id: sensor.bedroom_airpurifier_favorite_speed
      condition:
        - condition: template
          value_template: "{{ trigger.to_state.state | int(0) > 0 }}"
      action:
        - service: input_number.set_value
          entity_id: input_number.bedroom_airpurifier_favorite_speed
          data_template:
            value: "{{ trigger.to_state.state | int }}"

    - id: "Умный контроль скорости работы бризера в спальне"
      alias: bedroom_airpurifier_favourite_speed_smart_control
      initial_state: true
      trigger:
        - platform: time_pattern
          minutes: "/2"
      condition:
        - condition: state
          entity_id: sensor.bedroom_airpurifier_favourite_speed_needs_changes
          state:
            - "up"
            - "down"
        - condition: state
          entity_id: switch.bedroom_airpurifier_favourite_speed_smart_control
          state: "on"
        - condition: state
          entity_id: switch.bedroom_airpurifier_favourite_speed_temporary_fixed
          state: "off"
        - condition: template
          value_template: >
            {% set valid_prev_speed = states('sensor.bedroom_airpurifier_previous_speed') | int(0) > 0 %}
            {% set valid_next_speed = states('sensor.bedroom_airpurifier_previous_speed') | int(0) > 0 %}
            {{ valid_prev_speed and valid_next_speed }}
      action:
        - service: input_number.set_value
          entity_id: input_number.bedroom_airpurifier_favorite_speed
          data_template:
            value: >
              {% if is_state('sensor.bedroom_airpurifier_favourite_speed_needs_changes', 'up') %}
                {{ states('sensor.bedroom_airpurifier_next_speed') | int }}
              {% else %}
                {{ states('sensor.bedroom_airpurifier_previous_speed') | int }}
              {% endif %}

    - id: "Включение бризера в спальне"
      alias: bedroom_airpurifier_turn_on
      initial_state: true
      trigger:
        - platform: time_pattern
          minutes: "/10"
        - platform: state
          entity_id: switch.somebody_home
          from: "off"
          to: "on"
      condition:
        - condition: state
          entity_id: switch.somebody_home
          state: "on"
        - condition: state
          entity_id: fan.mijia_airpurifier_bedroom
          state: "off"
        - condition: template
          value_template: >
            {% set co2 = states('sensor.bedroom_co2') | float(600) %}
            {% set threshold = states('sensor.breezers_turnon_co2_threshold') | float(600) %}
            {% set somebody_home = is_state('switch.somebody_home', 'on') | int %}
            {% set co2_delta = states('sensor.bedroom_airpurifier_target_co2_delta') | float(0) %}
            {{ co2 > threshold + 50 + somebody_home * co2_delta }}
        - condition: state
          entity_id: input_boolean.bedroom_airpurifier_favourite_speed_smart_control
          state: "on"
      action:
        - service: fan.turn_on
          entity_id: fan.mijia_airpurifier_bedroom
        - delay: 00:00:30
        - if:
            - condition: state
              entity_id: fan.mijia_airpurifier_bedroom
              state: "on"
          then:
            - service: notify.tg_bot
              data:
                message: |
                  {{ '\U0001F4A8' }} Бризер в спальне включен.
                  {{ '\U0001F321' }} Температура {{ states('sensor.bedroom_average_temperature') | round(1) }}°C
                  {{ '\U0001F4A7' }} Влажность {{ states('sensor.bedroom_average_humidity') | round(1) }}%
                  {{ '\U0000269B' }} CO2 {{ states('sensor.bedroom_co2') | int }}ppm

    - id: "Выключение бризера в спальне"
      alias: bedroom_airpurifier_turn_off
      initial_state: true
      trigger:
        - platform: time_pattern
          minutes: "/30"
        - platform: state
          entity_id: switch.somebody_home
          from: "on"
          to: "off"
      condition:
        - condition: state
          entity_id: fan.mijia_airpurifier_bedroom
          state: "on"
        - condition: template
          value_template: >
            {% set co2 = states('sensor.bedroom_co2') | float(600) %}
            {% set threshold = states('sensor.breezers_turnoff_co2_threshold') | float(600) %}
            {% set somebody_home = is_state('switch.somebody_home', 'on') | int %}
            {% set co2_delta = states('sensor.bedroom_airpurifier_target_co2_delta') | float(0) %}
            {{ co2 < threshold + somebody_home * co2_delta }}
        - condition: state
          entity_id:
            - timer.bedroom_airpurifier_fixed_speed
          state: "idle"
        - condition: state
          entity_id: switch.bedroom_airpurifier_favourite_speed_smart_control
          state: "on"
        - condition: template
          value_template: >
            {% set temp_delta_ot = states('sensor.outside_target_temperature_delta') | float(-99) %}
            {% set temp_delta_ct = states('sensor.bedroom_current_target_temperature_delta') | float(99) %}
            {% set somebody_home = states('switch.somebody_home') | bool(True) %}
            {% set needs_cooling_from_outside = temp_delta_ot < -10 and temp_delta_ct > 1.5 and somebody_home %}
            {{ not needs_cooling_from_outside }}
      action:
        - service: switch.turn_off
          entity_id: switch.bedroom_airpurifier_ptc
          continue_on_error: true
        - service: fan.turn_off
          entity_id: fan.mijia_airpurifier_bedroom
        - delay: 00:00:45
        - if:
            - condition: state
              entity_id: fan.mijia_airpurifier_bedroom
              state: "off"
          then:
            - service: notify.tg_bot
              data:
                message: |
                  {{ '\U0001F4A8' }} Бризер в спальне выключен.
                  {{ '\U0001F321' }} Температура {{ states('sensor.bedroom_average_temperature') | round(1) }}°C
                  {{ '\U0001F4A7' }} Влажность {{ states('sensor.bedroom_average_humidity') | round(1) }}%
                  {{ '\U0000269B' }} CO2 {{ states('sensor.bedroom_co2') | int }}ppm
          else:
            - service: notify.tg_bot
              data:
                message: |
                  {{ '\U000026A0' }} Не получилось выключить бризер в спальне, статус {{ states('fan.mijia_airpurifier_bedroom') }}.

    - id: "Регулярное проветривание бризера в спальне"
      alias: bedroom_periodic_ventilation
      initial_state: true
      trigger:
        - platform: state
          entity_id: fan.mijia_airpurifier_bedroom
          from: "on"
          for:
            hours: 24
      condition:
        - condition: state
          entity_id: switch.somebody_home
          state: "off"
        - condition: state
          entity_id: fan.mijia_airpurifier_bedroom
          state: "off"
        - condition: state
          entity_id: input_boolean.bedroom_airpurifier_favourite_speed_smart_control
          state: "on"
      action:
        - service: fan.turn_on
          entity_id: fan.mijia_airpurifier_bedroom
        - service: input_select.select_option
          entity_id: input_select.bedroom_airpurifier_mode
          data:
            option: "Favorite"
        - service: input_number.set_value
          entity_id: input_number.bedroom_airpurifier_favorite_speed
          data:
            value: 100
        - service: timer.start
          entity_id: timer.bedroom_airpurifier_fixed_speed
