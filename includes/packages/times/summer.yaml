summer_time:
  input_boolean:
    warm_season:
      name: "Теплое время года"

  template:
    - switch:
        - name: "Теплое время года"
          unique_id: warm_season
          default_entity_id: switch.warm_season
          state: >
            {{ states('input_boolean.warm_season') }}
          turn_on:
            service: input_boolean.turn_on
            entity_id: input_boolean.warm_season
          turn_off:
            service: input_boolean.turn_off
            entity_id: input_boolean.warm_season
          icon: >
            {% if is_state('input_boolean.warm_season', 'on') %}
              mdi:white-balance-sunny
            {% else %}
              mdi:snowflake
            {% endif %}

  automation:
    - id: "Выключение увлажения"
      alias: summer_humidification_turn_off
      initial_state: true
      trigger:
        - platform: homeassistant
          event: start
        - platform: time_pattern
          hours: "/6"
        - platform: state
          entity_id: input_boolean.warm_season
          to: "on"
      condition:
        - condition: state
          entity_id: input_boolean.warm_season
          state: "on"
      action:
        - service: automation.turn_off
          data_template:
            entity_id: >-
              {{ states.automation
                | selectattr ('entity_id', 'match', 'automation.*humidifier.*|automation.telegram_.*humidification')
                | map(attribute='entity_id')
                | list }}
