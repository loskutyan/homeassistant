telemetry:
  template:
    - sensor:
        - name: "Автоматизаций всего"
          unique_id: automations_count
          default_entity_id: sensor.automations_count
          state: "{{ states.automation | list | length }}"
          icon: mdi:head

        - name: "Автоматизаций включено"
          unique_id: automations_on_count
          default_entity_id: sensor.automations_on_count
          state: "{{ states.automation | selectattr ('state', 'equalto', 'on') | list | length }}"
          icon: mdi:head-check

        - name: "Автоматизаций выключено"
          unique_id: automations_off_count
          default_entity_id: sensor.automations_off_count
          state: "{{ states.automation | selectattr ('state', 'equalto', 'off') | list | length }}"
          icon: mdi:head-remove

        - name: "Автоматизаций недоступно"
          unique_id: automations_unavailable_count
          default_entity_id: sensor.automations_unavailable_count
          state: "{{ states.automation | selectattr ('state', 'equalto', 'unavailable') | list | length }}"
          icon: mdi:head-question

        - name: "Скриптов всего"
          unique_id: scripts_count
          default_entity_id: sensor.scripts_count
          state: "{{ states.script | list | length }}"
          icon: mdi:file

        - name: "Скриптов включено"
          unique_id: scripts_on_count
          default_entity_id: sensor.scripts_on_count
          state: "{{ states.script | selectattr ('state', 'equalto', 'on') | list | length }}"
          icon: mdi:file-check

        - name: "Скриптов выключено"
          unique_id: scripts_off_count
          default_entity_id: sensor.scripts_off_count
          state: "{{ states.script | selectattr ('state', 'equalto', 'off') | list | length }}"
          icon: mdi:file-remove

        - name: "Скриптов недоступно"
          unique_id: scripts_unavailable_count
          default_entity_id: sensor.scripts_unavailable_count
          state: "{{ states.script | selectattr ('state', 'equalto', 'unavailable') | list | length }}"
          icon: mdi:file-question

        - name: "Светильников всего"
          unique_id: lights_count
          default_entity_id: sensor.lights_count
          state: "{{ states.light | list | length }}"
          icon: mdi:lightbulb-group

        - name: "Светильников включено"
          unique_id: lights_on_count
          default_entity_id: sensor.lights_on_count
          state: "{{ states.light | selectattr ('state', 'equalto', 'on') | list | length }}"
          icon: mdi:lightbulb-on

        - name: "Светильников выключено"
          unique_id: lights_off_count
          default_entity_id: sensor.lights_off_count
          state: "{{ states.light | selectattr ('state', 'equalto', 'off') | list | length }}"
          icon: mdi:lightbulb

        - name: "Светильников недоступно"
          unique_id: lights_unavailable_count
          default_entity_id: sensor.lights_unavailable_count
          state: "{{ states.light | selectattr ('state', 'equalto', 'unavailable') | list | length }}"
          icon: mdi:lightbulb-question

        - name: "Переключателей всего"
          unique_id: switches_count
          default_entity_id: sensor.switches_count
          state: "{{ states.switch | list | length }}"
          icon: mdi:toggle-switch

        - name: "Переключателей включено"
          unique_id: switches_on_count
          default_entity_id: sensor.switches_on_count
          state: "{{ states.switch | selectattr ('state', 'equalto', 'on') | list | length }}"
          icon: mdi:toggle-switch-variant

        - name: "Переключателей выключено"
          unique_id: switches_off_count
          default_entity_id: sensor.switches_off_count
          state: "{{ states.switch | selectattr ('state', 'equalto', 'off') | list | length }}"
          icon: mdi:toggle-switch-variant-off

        - name: "Переключателей недоступно"
          unique_id: switches_unavailable_count
          default_entity_id: sensor.switches_unavailable_count
          state: "{{ states.switch | selectattr ('state', 'equalto', 'unavailable') | list | length }}"
          icon: mdi:toggle-switch-outline

        - name: "Сенсоров недоступно"
          unique_id: sensors_unavailable_count
          default_entity_id: sensor.sensors_unavailable_count
          state: >
            {% set dishwasher_unavailable_sensors = [
              'sensor.dishwasher_remaining_program_time',
              'sensor.dishwasher_program_progress',
              'sensor.dishwasher_duration'
            ]%}
            {{ states.sensor
              | selectattr ('state', 'equalto', 'unavailable')
              | rejectattr ('entity_id', 'in', dishwasher_unavailable_sensors)
              | rejectattr ('entity_id', 'match', 'sensor.sun*')
              | rejectattr ('entity_id', 'match', 'sensor.cubeserver_parity_finish_timestamp*')
              | list
              | length }}
          icon: mdi:eye-off

        - name: "Бинарных сенсоров недоступно"
          unique_id: binary_sensors_unavailable_count
          default_entity_id: sensor.binary_sensors_unavailable_count
          state: "{{ states.binary_sensor | selectattr ('state', 'equalto', 'unavailable') | list | length }}"
          icon: mdi:alert-circle
