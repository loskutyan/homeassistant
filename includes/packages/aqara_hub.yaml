aqara_hub:
  input_number:
    aqara_hub_volume:
      name: "Aqara Hub Громкость"
      min: 0
      max: 100
      step: 1
      icon: mdi:volume-high

  template:
    - sensor:
        - name: "Aqara Hub Громкость"
          unique_id: aqara_hub_volume
          default_entity_id: sensor.aqara_hub_volume
          unit_of_measurement: "%"
          availability: "{{ state_attr('media_player.miio_gateway', 'volume_level') | float(-1) >= 0 }}"
          state: "{{ (state_attr('media_player.miio_gateway', 'volume_level') | float * 100) | int }}"
          icon: >
            {% set vol = states('sensor.aqara_hub_volume') | int(0) %}
            {% if vol > 60  %}
              mdi:volume-high
            {% elif vol > 25 %}
              mdi:volume-medium
            {% elif vol > 0 %}
              mdi:volume-low
            {% else %}
              mdi: volume-mute
            {% endif %}

  automation:
    - id: "Выбор громкости хаба Aqara"
      alias: select_aqara_hub_volume
      trigger:
        - platform: state
          entity_id: input_number.aqara_hub_volume
      action:
        - service: media_player.volume_set
          entity_id: media_player.miio_gateway
          data_template:
            volume_level: "{{ min(max(trigger.to_state.state | float / 100, 0), 1) }}"

    - id: "Отслеживание громкости хаба Aqara"
      alias: tracking_aqara_hub_volume
      trigger:
        - platform: state
          entity_id: sensor.aqara_hub_volume
      condition:
        - condition: template
          value_template: >
            {{ state_attr('media_player.miio_gateway', 'volume_level') | float(-1) >= 0 }}
      action:
        - service: input_number.set_value
          entity_id: input_number.aqara_hub_volume
          data_template:
            value: >
              {{ (state_attr('media_player.miio_gateway', 'volume_level') | float * 100) | int }}
