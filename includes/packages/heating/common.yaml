heating_common:
  input_number:
    target_temperature:
      name: "Желаемая температура"
      min: 18
      max: 28
      step: 0.5
      icon: mdi:thermometer

  template:
    - sensor:
        - name: "Температура на улице"
          unique_id: outside_temperature
          default_entity_id: sensor.outside_temperature
          device_class: temperature
          unit_of_measurement: "°C"
          state: >
            {{ state_attr('weather.yandex_weather', 'temperature') }}

        - name: "Разница уличной и желаемой температур"
          unique_id: outside_target_temperature_delta
          default_entity_id: sensor.outside_target_temperature_delta
          device_class: temperature
          unit_of_measurement: "°C"
          state: >
            {{ states('sensor.outside_temperature') | float  - states('input_number.target_temperature') | float }}
